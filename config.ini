[fill]
# target_date 留空表示使用电脑今天日期；也可以写 2026-06-10
target_date =

# 每批最多处理多少个 sheet。大文件建议保持 20。
limit_sheets = 20

# 是否只处理有标签背景色的 sheet。
colored_sheets = true

# 是否使用快速 XML 模式。大文件建议 true。
fast_xml = true

# 是否持续分批处理直到没有可修改的 sheet。
run_until_done = true

# 是否在运行前让用户选择 workspace 里的 Excel 文件。
select_workbook = true

# workbook 留空表示从 workspace 文件夹里选择；也可以填写具体文件名。
workbook =
